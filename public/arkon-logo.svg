<svg xmlns="http://www.w3.org/2000/svg" width="248" height="64" viewBox="0 0 248 64" role="img" aria-labelledby="title desc">
  <title id="title">ARKON Systems</title>
  <desc id="desc">ARKON Systems logo mark and wordmark.</desc>
  <defs>
    <linearGradient id="arkonMark" x1="4" y1="4" x2="56" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67D8FF"/>
      <stop offset="1" stop-color="#82F7CA"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.403 0 0 0 0 0.847 0 0 0 0 1 0 0 0 .32 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#softGlow)">
    <rect x="4" y="6" width="52" height="52" rx="15" fill="url(#arkonMark)"/>
    <path d="M30 17L46 47H38.4L35.4 41H24.6L21.6 47H14L30 17ZM27.3 34.8H32.7L30 29.2L27.3 34.8Z" fill="#06111F"/>
    <path d="M20 50H40" stroke="#06111F" stroke-width="3" stroke-linecap="round" opacity=".9"/>
  </g>

  <g fill="#EEF5FF" font-family="Inter, Arial, Helvetica, sans-serif">
    <text x="72" y="35" font-size="27" font-weight="900" letter-spacing="3.5">ARKON</text>
    <text x="75" y="50" font-size="10" font-weight="700" letter-spacing="4.1" fill="#9FB0CA">SYSTEMS</text>
  </g>
</svg>
